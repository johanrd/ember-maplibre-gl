name: Plan Release
on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request_target:
    types:
      - labeled
      - unlabeled

concurrency:
  group: plan-release
  cancel-in-progress: true

jobs:
  should-run:
    name: Check if release needed
    runs-on: ubuntu-latest
    outputs:
      should-prepare: ${{ steps.should-prepare.outputs.should-prepare }}
    steps:
      - uses: release-plan/actions/should-prepare-release@v1
        with:
          ref: "main"
        id: should-prepare

  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: should-run
    if: needs.should-run.outputs.should-prepare == 'true'
    permissions:
      contents: write
      issues: read
      pull-requests: write
    steps:
      - uses: release-plan/actions/prepare@v1
        with:
          ref: "main"
        env:
          GITHUB_AUTH: ${{ secrets.GITHUB_TOKEN }}
        id: explanation

      - uses: peter-evans/create-pull-request@v8
        if: steps.explanation.outputs.new-version
        with:
          commit-message: "Prepare Release ${{ steps.explanation.outputs.new-version }} using release-plan"
          labels: "internal"
          sign-commits: true
          branch: release-preview
          title: Prepare Release ${{ steps.explanation.outputs.new-version }}
          body: |
            This PR is a preview of the release that [release-plan](https://github.com/embroider-build/release-plan) has prepared. To release you should just merge this PR.

            -----------------------------------------

            ${{ steps.explanation.outputs.text }}
